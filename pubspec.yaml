name: unipath
description: "UniPath - Study Planner & Exam Tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icone
  cupertino_icons: ^1.0.8
  
  # UUID per ID univoci
  uuid: ^4.5.3
  
  # State Management
  provider: ^6.1.1
  
  # Database locale SQLite
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.9.0
  
  # Persistenza key-value (per Dark Mode)
  shared_preferences: ^2.2.2
  
  # Grafici per statistiche
  fl_chart: ^0.66.0
  
  # Formatting date
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
  - assets/icon/UniPath_ICON.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/UniPath_ICON.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/UniPath_ICON.png"